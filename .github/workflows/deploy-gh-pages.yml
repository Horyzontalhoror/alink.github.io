name: Build and Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # Sesuaikan jika branch utama kamu 'master'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Diupdate dari v3 ke v4
      - uses: actions/setup-node@v4 # Diupdate dari v3 ke v4
        with:
          node-version: 18
      - name: Install dependencies
        run: npm install
      - name: Build Eleventy
        run: npx @11ty/eleventy
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3 # Diupdate dari v2 ke v3 (menggunakan upload-artifact v4 di baliknya)
        with:
          path: '_site' # Pastikan folder ini sesuai dengan output Eleventy kamu

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4 # Diupdate dari v2 ke v4